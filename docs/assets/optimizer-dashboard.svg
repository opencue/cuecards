<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" fill="none" role="img" aria-label="cue optimizer summary: 16 profiles, 1927 skills, 15 MCPs, 79 CLIs">
  <style>
    .t-eyebrow { font: 700 11px 'SF Mono', monospace; letter-spacing: 2px; fill: #94a3b8; }
    .t-h       { font: 700 22px -apple-system, system-ui, sans-serif; fill: #f1f5f9; }
    .t-sub     { font: 13px -apple-system, system-ui, sans-serif; fill: #94a3b8; }
    .t-secn    { font: 700 13px -apple-system, system-ui, sans-serif; fill: #f1f5f9; }
    .t-secn-s  { font: 11px -apple-system, system-ui, sans-serif; fill: #94a3b8; }
    .bar-bg    { fill: #334155; fill-opacity: 0.55; }
    .row-lbl   { font: 12px 'SF Mono', monospace; fill: #f1f5f9; }
    .row-val   { font: 11px 'SF Mono', monospace; fill: #94a3b8; }
  </style>
  <defs>
    <linearGradient id="dashAcc1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="dashAcc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="dashAcc3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="dashAcc4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#c084fc"/>
