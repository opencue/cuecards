      <text x="20" y="32" font-family="'SF Mono', monospace" font-size="11" fill="#a5b4fc" font-weight="700" letter-spacing="2">PROFILES</text>
      <text x="20" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#dashAcc1)">16</text>
      <text x="20" y="108" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8">one per workflow domain</text>
    </g>

    <g transform="translate(204,0)">
      <rect width="190" height="120" rx="14" fill="#22c55e" fill-opacity="0.14" stroke="#4ade80" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="20" y="32" font-family="'SF Mono', monospace" font-size="11" fill="#4ade80" font-weight="700" letter-spacing="2">SKILLS</text>
      <text x="20" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#dashAcc2)">1,927</text>
      <text x="20" y="108" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8">SKILL.md files indexed</text>
    </g>

    <g transform="translate(408,0)">
      <rect width="190" height="120" rx="14" fill="#f59e0b" fill-opacity="0.14" stroke="#fbbf24" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="20" y="32" font-family="'SF Mono', monospace" font-size="11" fill="#fbbf24" font-weight="700" letter-spacing="2">MCP SERVERS</text>
      <text x="20" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#dashAcc3)">15</text>
      <text x="20" y="108" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8">scoped per profile</text>
    </g>

    <g transform="translate(612,0)">
      <rect width="190" height="120" rx="14" fill="#ec4899" fill-opacity="0.14" stroke="#f472b6" stroke-opacity="0.6" stroke-width="1.5"/>
      <text x="20" y="32" font-family="'SF Mono', monospace" font-size="11" fill="#f472b6" font-weight="700" letter-spacing="2">REQUIRED CLIs</text>
      <text x="20" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#dashAcc4)">79</text>
      <text x="20" y="108" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#94a3b8">install status checked</text>
    </g>
  </g>

  <g transform="translate(40,260)">
