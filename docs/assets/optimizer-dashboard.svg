<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" fill="none" role="img" aria-label="cue optimizer summary: 16 profiles, 1927 skills, 15 MCPs, 79 CLIs">
  <defs>
    <linearGradient id="dashAcc1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="dashAcc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="dashAcc3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="dashAcc4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- header -->
  <g transform="translate(40,32)">
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="11" fill="#6b7280" letter-spacing="2">CUE OPTIMIZER · LIVE SCAN</text>
    <text x="0" y="28" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="currentColor">What's loaded across every profile</text>
    <text x="0" y="50" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#6b7280">One read across every <tspan font-family="'SF Mono', monospace" fill="currentColor">profile.yaml</tspan> — skills, MCPs, required CLIs, install status, usage frequency.</text>
  </g>

  <!-- big number cards -->
  <g transform="translate(40,108)">
    <g transform="translate(0,0)">
      <rect width="190" height="120" rx="14" fill="url(#dashAcc1)" fill-opacity="0.10" stroke="#6366f1" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="20" y="32" font-family="'SF Mono', monospace" font-size="11" fill="#6366f1" font-weight="700" letter-spacing="2">PROFILES</text>
      <text x="20" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#dashAcc1)">16</text>
      <text x="20" y="108" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#6b7280">one per workflow domain</text>
    </g>

    <g transform="translate(204,0)">
      <rect width="190" height="120" rx="14" fill="url(#dashAcc2)" fill-opacity="0.10" stroke="#22c55e" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="20" y="32" font-family="'SF Mono', monospace" font-size="11" fill="#22c55e" font-weight="700" letter-spacing="2">SKILLS</text>
      <text x="20" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#dashAcc2)">1,927</text>
      <text x="20" y="108" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#6b7280">SKILL.md files indexed</text>
    </g>

    <g transform="translate(408,0)">
      <rect width="190" height="120" rx="14" fill="url(#dashAcc3)" fill-opacity="0.10" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="20" y="32" font-family="'SF Mono', monospace" font-size="11" fill="#f59e0b" font-weight="700" letter-spacing="2">MCP SERVERS</text>
      <text x="20" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#dashAcc3)">15</text>
      <text x="20" y="108" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#6b7280">scoped per profile</text>
    </g>

    <g transform="translate(612,0)">
      <rect width="190" height="120" rx="14" fill="url(#dashAcc4)" fill-opacity="0.10" stroke="#ec4899" stroke-opacity="0.35" stroke-width="1.5"/>
      <text x="20" y="32" font-family="'SF Mono', monospace" font-size="11" fill="#ec4899" font-weight="700" letter-spacing="2">REQUIRED CLIs</text>
      <text x="20" y="86" font-family="-apple-system, system-ui, sans-serif" font-size="56" font-weight="800" fill="url(#dashAcc4)">79</text>
      <text x="20" y="108" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#6b7280">install status checked</text>
    </g>
  </g>

  <!-- usage chart -->
  <g transform="translate(40,260)">
    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="700" fill="currentColor">Top skills by session reads</text>
    <text x="0" y="18" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#6b7280">scanned from <tspan font-family="'SF Mono', monospace" fill="currentColor">~/.claude/projects/**/*.jsonl</tspan></text>

    <g transform="translate(0,36)" font-family="'SF Mono', monospace" font-size="11" fill="currentColor">
      <!-- bar rows -->
      <g transform="translate(0,0)">
        <text x="0" y="11">🦋 ui-ux-pro-max</text>
        <rect x="180" y="2" width="600" height="12" rx="4" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="180" y="2" width="600" height="12" rx="4" fill="url(#dashAcc1)"/>
        <text x="788" y="11" text-anchor="end" fill="#ffffff" font-weight="700">1008×</text>
      </g>
      <g transform="translate(0,22)">
        <text x="0" y="11">🐺 worker</text>
        <rect x="180" y="2" width="600" height="12" rx="4" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="180" y="2" width="81" height="12" rx="4" fill="#8b5cf6"/>
        <text x="266" y="11" fill="#6b7280">136×</text>
      </g>
      <g transform="translate(0,44)">
        <text x="0" y="11">🐺 gitguardex</text>
        <rect x="180" y="2" width="600" height="12" rx="4" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="180" y="2" width="68" height="12" rx="4" fill="#8b5cf6"/>
        <text x="253" y="11" fill="#6b7280">114×</text>
      </g>
      <g transform="translate(0,66)">
        <text x="0" y="11">🦉 awesome-rust-search</text>
        <rect x="180" y="2" width="600" height="12" rx="4" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="180" y="2" width="31" height="12" rx="4" fill="#22c55e"/>
        <text x="216" y="11" fill="#6b7280">52×</text>
      </g>
      <g transform="translate(0,88)">
        <text x="0" y="11">🐻 supabase</text>
        <rect x="180" y="2" width="600" height="12" rx="4" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="180" y="2" width="25" height="12" rx="4" fill="#22c55e"/>
        <text x="210" y="11" fill="#6b7280">42×</text>
      </g>
      <g transform="translate(0,110)">
        <text x="0" y="11">🐻 stripe-best-practices</text>
        <rect x="180" y="2" width="600" height="12" rx="4" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="180" y="2" width="19" height="12" rx="4" fill="#22c55e"/>
        <text x="204" y="11" fill="#6b7280">32×</text>
      </g>
      <g transform="translate(0,132)">
        <text x="0" y="11">🐢 caveman</text>
        <rect x="180" y="2" width="600" height="12" rx="4" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="180" y="2" width="13" height="12" rx="4" fill="#f59e0b"/>
        <text x="198" y="11" fill="#6b7280">21×</text>
      </g>
    </g>
  </g>
</svg>
