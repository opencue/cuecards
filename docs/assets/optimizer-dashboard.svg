  </defs>

  <g transform="translate(40,32)">
    <text x="0" y="0" class="t-eyebrow">CUE OPTIMIZER · LIVE SCAN</text>
    <text x="0" y="28" class="t-h">What's loaded across every profile</text>
    <text x="0" y="50" class="t-sub">One read across every <tspan font-family="'SF Mono', monospace" fill="#e5e7eb">profile.yaml</tspan> — skills, MCPs, required CLIs, install status, usage frequency.</text>
  </g>

  <g transform="translate(40,108)">
