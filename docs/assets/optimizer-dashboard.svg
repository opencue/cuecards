        <text x="788" y="11" text-anchor="end" fill="#0f172a" font-weight="800" font-family="'SF Mono', monospace" font-size="11">1008×</text>
      </g>
      <g transform="translate(0,22)">
        <text x="0" y="11" class="row-lbl">🐺 worker</text>
        <rect x="180" y="2" width="600" height="12" rx="4" class="bar-bg"/>
        <rect x="180" y="2" width="81" height="12" rx="4" fill="#a78bfa"/>
        <text x="266" y="11" class="row-val">136×</text>
      </g>
      <g transform="translate(0,44)">
        <text x="0" y="11" class="row-lbl">🐺 gitguardex</text>
        <rect x="180" y="2" width="600" height="12" rx="4" class="bar-bg"/>
        <rect x="180" y="2" width="68" height="12" rx="4" fill="#a78bfa"/>
        <text x="253" y="11" class="row-val">114×</text>
      </g>
      <g transform="translate(0,66)">
        <text x="0" y="11" class="row-lbl">🦉 awesome-rust-search</text>
        <rect x="180" y="2" width="600" height="12" rx="4" class="bar-bg"/>
        <rect x="180" y="2" width="31" height="12" rx="4" fill="#4ade80"/>
        <text x="216" y="11" class="row-val">52×</text>
      </g>
      <g transform="translate(0,88)">
        <text x="0" y="11" class="row-lbl">🐻 supabase</text>
        <rect x="180" y="2" width="600" height="12" rx="4" class="bar-bg"/>
        <rect x="180" y="2" width="25" height="12" rx="4" fill="#4ade80"/>
        <text x="210" y="11" class="row-val">42×</text>
      </g>
      <g transform="translate(0,110)">
        <text x="0" y="11" class="row-lbl">🐻 stripe-best-practices</text>
        <rect x="180" y="2" width="600" height="12" rx="4" class="bar-bg"/>
        <rect x="180" y="2" width="19" height="12" rx="4" fill="#4ade80"/>
        <text x="204" y="11" class="row-val">32×</text>
      </g>
      <g transform="translate(0,132)">
        <text x="0" y="11" class="row-lbl">🐢 caveman</text>
        <rect x="180" y="2" width="600" height="12" rx="4" class="bar-bg"/>
        <rect x="180" y="2" width="13" height="12" rx="4" fill="#fbbf24"/>
        <text x="198" y="11" class="row-val">21×</text>
      </g>
