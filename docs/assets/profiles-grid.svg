<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640" fill="none" role="img" aria-label="cue profile catalog">
  <style>
    .pTitle  { font: 700 22px -apple-system, system-ui, sans-serif; fill: currentColor; }
    .pSub    { font: 13px -apple-system, system-ui, sans-serif; fill: #6b7280; }
    .pName   { font: 700 14px -apple-system, system-ui, sans-serif; fill: currentColor; }
    .pDesc   { font: 11px -apple-system, system-ui, sans-serif; fill: #6b7280; }
    .pNum    { font: 700 12px 'SF Mono', monospace; fill: #6366f1; }
    .pTag    { font: 9px 'SF Mono', monospace; fill: #6b7280; letter-spacing: 0.5; }
  </style>

  <!-- header -->
  <text x="40" y="40" class="pTitle">The 16-profile catalog</text>
  <text x="40" y="62" class="pSub">Each card is a self-contained loadout. Skill / MCP / CLI counts taken from <tspan font-family="'SF Mono', monospace" fill="currentColor">cue optimizer</tspan>.</text>

  <!-- card template repeated -->
