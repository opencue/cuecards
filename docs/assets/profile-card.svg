<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" fill="none" role="img" aria-label="cue optimizer frontend profile card">
  <defs>
    <linearGradient id="pcBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- card frame -->
  <rect x="20" y="20" width="840" height="420" rx="18" fill="url(#pcBg)" stroke="#6366f1" stroke-opacity="0.30" stroke-width="1.5"/>

  <!-- title bar -->
  <g transform="translate(44,52)">
    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-size="36">🦋</text>
    <text x="48" y="-4" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="700" fill="currentColor">frontend</text>
    <text x="48" y="14" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#6b7280">Frontend UI implementation, redesign, screenshots, browser testing.</text>
  </g>

  <!-- top stats -->
  <g transform="translate(44,96)" font-family="-apple-system, system-ui, sans-serif">
    <g>
      <text x="0" y="0" font-size="10" fill="#6b7280" letter-spacing="1.5">📦 SKILLS</text>
      <text x="0" y="24" font-size="22" font-weight="800" fill="#6366f1">10</text>
    </g>
    <g transform="translate(110,0)">
      <text x="0" y="0" font-size="10" fill="#6b7280" letter-spacing="1.5">🔌 MCPs</text>
      <text x="0" y="24" font-size="22" font-weight="800" fill="#8b5cf6">0</text>
    </g>
    <g transform="translate(220,0)">
      <text x="0" y="0" font-size="10" fill="#6b7280" letter-spacing="1.5">🖥️  CLIs</text>
      <text x="0" y="24" font-size="22" font-weight="800" fill="#22c55e">2/2</text>
    </g>
    <g transform="translate(330,0)">
      <text x="0" y="0" font-size="10" fill="#6b7280" letter-spacing="1.5">📊 USAGE</text>
      <text x="0" y="24" font-size="22" font-weight="800" fill="#f59e0b">1,056×</text>
    </g>
  </g>

  <!-- skills list -->
  <g transform="translate(44,160)">
    <text x="0" y="0" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#6b7280" letter-spacing="2">SKILLS · CALLED PER SESSION</text>

    <g font-family="'SF Mono', monospace" font-size="12" fill="currentColor" transform="translate(0,22)">
      <g transform="translate(0,0)">
        <text x="0" y="11">design-taste-frontend</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <text x="770" y="11" fill="#9ca3af" font-size="10">—</text>
      </g>
      <g transform="translate(0,20)">
        <text x="0" y="11" font-weight="700">ui-ux-pro-max</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#6366f1"/>
        <text x="752" y="11" text-anchor="end" fill="#ffffff" font-weight="700" font-size="10">1008×</text>
      </g>
      <g transform="translate(0,40)">
        <text x="0" y="11">image-to-code</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <text x="770" y="11" fill="#9ca3af" font-size="10">—</text>
      </g>
      <g transform="translate(0,60)">
        <text x="0" y="11">redesign-existing-projects</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <text x="770" y="11" fill="#9ca3af" font-size="10">—</text>
      </g>
      <g transform="translate(0,80)">
        <text x="0" y="11">screenshot</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <text x="770" y="11" fill="#9ca3af" font-size="10">—</text>
      </g>
      <g transform="translate(0,100)">
        <text x="0" y="11">playwright</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <rect x="240" y="2" width="3" height="10" rx="3" fill="#22c55e"/>
        <text x="252" y="11" fill="#6b7280" font-size="10">4×</text>
      </g>
      <g transform="translate(0,120)">
        <text x="0" y="11">imagegen-frontend-web</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <text x="770" y="11" fill="#9ca3af" font-size="10">—</text>
      </g>
      <g transform="translate(0,140)">
        <text x="0" y="11">imagegen-frontend-mobile</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <text x="770" y="11" fill="#9ca3af" font-size="10">—</text>
      </g>
      <g transform="translate(0,160)">
        <text x="0" y="11">minimalist-ui</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <text x="770" y="11" fill="#9ca3af" font-size="10">—</text>
      </g>
      <g transform="translate(0,180)">
        <text x="0" y="11">industrial-brutalist-ui</text>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#e5e7eb" fill-opacity="0.4"/>
        <text x="770" y="11" fill="#9ca3af" font-size="10">—</text>
      </g>
    </g>
  </g>

  <!-- footer -->
  <g transform="translate(44,408)">
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="10" fill="#6b7280">+ 7 built-in skills inherited from <tspan fill="#6366f1">core</tspan> · usage scanned from session transcripts</text>
  </g>
</svg>
