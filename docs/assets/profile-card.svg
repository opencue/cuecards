<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" fill="none" role="img" aria-label="cue optimizer frontend profile card">
  <style>
    .t-name    { font: 700 22px -apple-system, system-ui, sans-serif; fill: #f1f5f9; }
    .t-desc    { font: 12px -apple-system, system-ui, sans-serif; fill: #94a3b8; }
    .t-stat-l  { font: 10px -apple-system, system-ui, sans-serif; letter-spacing: 1.5px; fill: #94a3b8; }
    .t-eyebrow { font: 11px -apple-system, system-ui, sans-serif; letter-spacing: 2px; fill: #94a3b8; }
    .row-lbl   { font: 12px 'SF Mono', monospace; fill: #f1f5f9; }
    .row-lbl-b { font: 700 12px 'SF Mono', monospace; fill: #f1f5f9; }
    .row-val   { font: 10px 'SF Mono', monospace; fill: #64748b; }
    .t-foot    { font: 10px 'SF Mono', monospace; fill: #94a3b8; }
    .bar-bg    { fill: #334155; fill-opacity: 0.55; }
  </style>
  <defs>
    <linearGradient id="pcBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="840" height="420" rx="18" fill="url(#pcBg)" stroke="#818cf8" stroke-opacity="0.55" stroke-width="1.5"/>

  <g transform="translate(44,52)">
    <text x="0" y="0" font-size="36">🦋</text>
    <text x="48" y="-4" class="t-name">frontend</text>
    <text x="48" y="14" class="t-desc">Frontend UI implementation, redesign, screenshots, browser testing.</text>
  </g>

  <g transform="translate(44,96)">
    <g>
      <text x="0" y="0" class="t-stat-l">📦 SKILLS</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#a5b4fc">10</text>
    </g>
    <g transform="translate(110,0)">
      <text x="0" y="0" class="t-stat-l">🔌 MCPs</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#c4b5fd">0</text>
    </g>
    <g transform="translate(220,0)">
      <text x="0" y="0" class="t-stat-l">🖥️  CLIs</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#4ade80">2/2</text>
    </g>
    <g transform="translate(330,0)">
      <text x="0" y="0" class="t-stat-l">📊 USAGE</text>
      <text x="0" y="24" font-family="-apple-system, system-ui, sans-serif" font-size="22" font-weight="800" fill="#fbbf24">1,056×</text>
    </g>
  </g>

  <g transform="translate(44,160)">
    <text x="0" y="0" class="t-eyebrow">SKILLS · CALLED PER SESSION</text>

    <g transform="translate(0,22)">
      <g>
        <text x="0" y="11" class="row-lbl">design-taste-frontend</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,20)">
        <text x="0" y="11" class="row-lbl-b">ui-ux-pro-max</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <rect x="240" y="2" width="520" height="10" rx="3" fill="#818cf8"/>
        <text x="752" y="11" text-anchor="end" fill="#0f172a" font-weight="800" font-family="'SF Mono', monospace" font-size="10">1008×</text>
      </g>
      <g transform="translate(0,40)">
        <text x="0" y="11" class="row-lbl">image-to-code</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,60)">
        <text x="0" y="11" class="row-lbl">redesign-existing-projects</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,80)">
        <text x="0" y="11" class="row-lbl">screenshot</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,100)">
        <text x="0" y="11" class="row-lbl">playwright</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <rect x="240" y="2" width="3" height="10" rx="3" fill="#4ade80"/>
        <text x="252" y="11" font-family="'SF Mono', monospace" font-size="10" fill="#94a3b8">4×</text>
      </g>
      <g transform="translate(0,120)">
        <text x="0" y="11" class="row-lbl">imagegen-frontend-web</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,140)">
        <text x="0" y="11" class="row-lbl">imagegen-frontend-mobile</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,160)">
        <text x="0" y="11" class="row-lbl">minimalist-ui</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
      <g transform="translate(0,180)">
        <text x="0" y="11" class="row-lbl">industrial-brutalist-ui</text>
        <rect x="240" y="2" width="520" height="10" rx="3" class="bar-bg"/>
        <text x="770" y="11" class="row-val">—</text>
      </g>
    </g>
  </g>

  <g transform="translate(44,408)">
    <text x="0" y="0" class="t-foot">+ 7 built-in skills inherited from <tspan fill="#a5b4fc">core</tspan> · usage scanned from session transcripts</text>
  </g>
</svg>
